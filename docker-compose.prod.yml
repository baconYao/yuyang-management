services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: yuyang-postgres-prod
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=yuyang_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - yuyang-network-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yuyang-api-prod
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=yuyang_db
    networks:
      - yuyang-network-prod
    # No volume mount in production - use built image
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (Production mode)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yuyang-frontend-prod
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - yuyang-network-prod
    # No volume mount in production - use built image

volumes:
  postgres_data_prod:
    driver: local

networks:
  yuyang-network-prod:
    driver: bridge
