services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: yuyang-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=yuyang_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - yuyang-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yuyang-api
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=yuyang_db
    networks:
      - yuyang-network
    volumes:
      # Mount app directory for development hot reload
      - ./backend/app:/app/app
      # Mount scripts directory for data generation
      - ./backend/scripts:/app/scripts
      # Alembic migrations (must match /app/migrations in the image)
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/migrations:/app/migrations
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (Development mode)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: yuyang-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # Proxy target for Vite dev server (server-side, not client-side)
      - VITE_API_TARGET=http://api:8000
    networks:
      - yuyang-network
    volumes:
      # Mount source code for hot reload
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      # Exclude node_modules from volume mount
      - /app/node_modules

volumes:
  postgres_data:
    driver: local

networks:
  yuyang-network:
    driver: bridge
